<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Country Catalog</title>
    <meta name="description" content="Explore countries around the world — capitals, languages, populations and more in one beautiful catalog." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══════════════════════════════════════════
         DESIGN TOKENS
         ═══════════════════════════════════════════ */
      :root {
        --bg-base: #0a0a12;
        --bg-surface: rgba(255, 255, 255, 0.04);
        --bg-surface-hover: rgba(255, 255, 255, 0.08);
        --bg-elevated: rgba(255, 255, 255, 0.06);

        --accent-1: #7c5cfc;          /* violet */
        --accent-2: #f0736e;          /* coral  */
        --accent-3: #3eddc6;          /* teal   */
        --accent-glow: rgba(124, 92, 252, 0.35);

        --text-primary: #eeeef5;
        --text-secondary: #8888a4;
        --text-muted: #5e5e78;

        --border-subtle: rgba(255, 255, 255, 0.07);
        --border-accent: rgba(124, 92, 252, 0.35);

        --radius-sm: 10px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --radius-full: 999px;

        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
        --shadow-glow: 0 0 60px -12px var(--accent-glow);

        --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ═══════════════════════════════════════════
         RESET & BASE
         ═══════════════════════════════════════════ */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Outfit', sans-serif;
        color: var(--text-primary);
        background: var(--bg-base);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* ═══════════════════════════════════════════
         ANIMATED BACKGROUND
         ═══════════════════════════════════════════ */
      body::before,
      body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        z-index: 0;
        pointer-events: none;
        will-change: transform;
      }

      body::before {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(124, 92, 252, 0.18), transparent 70%);
        top: -120px;
        left: -80px;
        animation: orbFloat1 18s ease-in-out infinite alternate;
      }

      body::after {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(240, 115, 110, 0.12), transparent 70%);
        bottom: -100px;
        right: -60px;
        animation: orbFloat2 22s ease-in-out infinite alternate;
      }

      @keyframes orbFloat1 {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(120px, 80px) scale(1.15); }
        100% { transform: translate(-40px, 160px) scale(0.95); }
      }

      @keyframes orbFloat2 {
        0%   { transform: translate(0, 0) scale(1); }
        50%  { transform: translate(-100px, -60px) scale(1.1); }
        100% { transform: translate(60px, -120px) scale(0.9); }
      }

      /* Third floating orb via wrapper */
      .bg-orb {
        position: fixed;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(130px);
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(circle, rgba(62, 221, 198, 0.12), transparent 70%);
        top: 50%;
        left: 50%;
        animation: orbFloat3 20s ease-in-out infinite alternate;
      }

      @keyframes orbFloat3 {
        0%   { transform: translate(-50%, -50%) scale(1); }
        100% { transform: translate(-30%, -70%) scale(1.2); }
      }

      /* ═══════════════════════════════════════════
         LAYOUT WRAPPER
         ═══════════════════════════════════════════ */
      .page-wrapper {
        position: relative;
        z-index: 1;
      }

      /* ═══════════════════════════════════════════
         HEADER
         ═══════════════════════════════════════════ */
      header {
        text-align: center;
        padding: 72px 24px 32px;
        position: relative;
      }

      header .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        padding: 6px 18px;
        border-radius: var(--radius-full);
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(124, 92, 252, 0.3);
        animation: badgePulse 3s ease-in-out infinite;
      }

      @keyframes badgePulse {
        0%, 100% { box-shadow: 0 4px 20px rgba(124, 92, 252, 0.3); }
        50%      { box-shadow: 0 4px 30px rgba(124, 92, 252, 0.5); }
      }

      header h1 {
        font-size: clamp(2.2rem, 5vw, 4rem);
        font-weight: 800;
        line-height: 1.1;
        background: linear-gradient(135deg, #ffffff 20%, var(--accent-3) 60%, var(--accent-1) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
      }

      header p.subtitle {
        color: var(--text-secondary);
        margin-top: 14px;
        font-size: 1.05rem;
        font-weight: 300;
        letter-spacing: 0.3px;
      }

      /* ═══════════════════════════════════════════
         STATS BAR
         ═══════════════════════════════════════════ */
      #status {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        padding: 8px 24px;
        max-width: 1260px;
        margin: 0 auto;
      }

      #status span {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-full);
        padding: 6px 16px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: all var(--transition-fast);
      }

      #status span:hover {
        background: var(--bg-surface-hover);
        border-color: var(--border-accent);
        color: var(--text-primary);
      }

      #status span strong {
        color: var(--accent-3);
        font-weight: 600;
      }

      /* ═══════════════════════════════════════════
         CONTROLS
         ═══════════════════════════════════════════ */
      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        max-width: 1260px;
        margin: 24px auto;
        padding: 0 24px;
      }

      /* Search */
      .search-wrapper {
        position: relative;
        flex: 1;
        min-width: 220px;
        max-width: 400px;
      }

      .search-wrapper svg {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        transition: color var(--transition-fast);
      }

      #search {
        width: 100%;
        padding: 13px 18px 13px 46px;
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        font-weight: 400;
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-full);
        color: var(--text-primary);
        outline: none;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transition: all var(--transition-fast);
      }

      #search::placeholder {
        color: var(--text-muted);
      }

      #search:focus {
        border-color: var(--accent-1);
        box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15), var(--shadow-glow);
        background: var(--bg-surface-hover);
      }

      #search:focus ~ svg {
        color: var(--accent-1);
      }

      /* Select */
      .select-wrapper {
        position: relative;
      }

      .select-wrapper svg {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--text-muted);
        transition: color var(--transition-fast);
      }

      #sort {
        appearance: none;
        padding: 13px 46px 13px 20px;
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        font-weight: 400;
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-full);
        color: var(--text-primary);
        outline: none;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      #sort option {
        background: #16162a;
        color: var(--text-primary);
      }

      #sort:focus {
        border-color: var(--accent-1);
        box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
      }

      #sort:hover {
        border-color: var(--border-accent);
      }

      .results-count {
        margin-left: auto;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        white-space: nowrap;
        letter-spacing: 0.3px;
      }

      /* ═══════════════════════════════════════════
         LOADING SKELETON
         ═══════════════════════════════════════════ */
      #loading {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
        padding: 0 24px 48px;
        max-width: 1260px;
        margin: 0 auto;
      }

      .skeleton {
        background: var(--bg-surface);
        border-radius: var(--radius-md);
        height: 300px;
        border: 1px solid var(--border-subtle);
        overflow: hidden;
        position: relative;
      }

      .skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 50%,
          transparent 100%
        );
        animation: shimmer 2s ease-in-out infinite;
      }

      @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }

      /* ═══════════════════════════════════════════
         CATALOG GRID
         ═══════════════════════════════════════════ */
      #Catalog {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
        padding: 0 24px 80px;
        max-width: 1260px;
        margin: 0 auto;
      }

      /* ═══════════════════════════════════════════
         CARDS
         ═══════════════════════════════════════════ */
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 24px 20px;
        text-align: center;
        cursor: pointer;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        position: relative;
        overflow: hidden;
        animation: cardEnter 0.5s ease both;
        transition:
          transform var(--transition-smooth),
          box-shadow var(--transition-smooth),
          border-color var(--transition-smooth),
          background var(--transition-smooth);
      }

      /* Top gradient line */
      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      }

      /* Subtle inner glow on hover */
      .card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        opacity: 0;
        background: radial-gradient(
          ellipse at 50% 0%,
          rgba(124, 92, 252, 0.08) 0%,
          transparent 70%
        );
        transition: opacity var(--transition-smooth);
        pointer-events: none;
      }

      .card:hover {
        transform: translateY(-8px) scale(1.01);
        box-shadow:
          var(--shadow-card),
          0 0 0 1px rgba(124, 92, 252, 0.25),
          0 20px 50px -10px rgba(0, 0, 0, 0.5);
        border-color: rgba(124, 92, 252, 0.3);
        background: var(--bg-surface-hover);
      }

      .card:hover::before {
        transform: scaleX(1);
      }

      .card:hover::after {
        opacity: 1;
      }

      .card:active {
        transform: translateY(-3px) scale(1);
        transition-duration: 0.1s;
      }

      @keyframes cardEnter {
        from {
          opacity: 0;
          transform: translateY(28px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      /* Flag image */
      .card img {
        width: 120px;
        height: 76px;
        object-fit: cover;
        border-radius: var(--radius-sm);
        margin-bottom: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
      }

      .card:hover img {
        transform: scale(1.08) translateY(-2px);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5);
      }

      /* Country name */
      .card h3 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 12px;
        letter-spacing: -0.2px;
        position: relative;
        z-index: 1;
      }

      /* Info rows */
      .card .info-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-size: 12.5px;
        color: var(--text-secondary);
        margin: 5px 0;
        position: relative;
        z-index: 1;
      }

      .card .info-row span.label {
        color: var(--accent-3);
        font-weight: 600;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Continent badge */
      .card .continent-badge {
        display: inline-block;
        margin-top: 14px;
        padding: 4px 14px;
        border-radius: var(--radius-full);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        background: linear-gradient(135deg, rgba(124, 92, 252, 0.12), rgba(240, 115, 110, 0.08));
        color: var(--accent-1);
        border: 1px solid rgba(124, 92, 252, 0.2);
        position: relative;
        z-index: 1;
        transition: all var(--transition-fast);
      }

      .card:hover .continent-badge {
        background: linear-gradient(135deg, rgba(124, 92, 252, 0.2), rgba(240, 115, 110, 0.12));
        border-color: rgba(124, 92, 252, 0.4);
      }

      /* ═══════════════════════════════════════════
         EMPTY STATE
         ═══════════════════════════════════════════ */
      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 100px 24px;
        color: var(--text-muted);
      }

      .empty-state svg {
        opacity: 0.25;
        margin-bottom: 20px;
      }

      .empty-state p {
        font-size: 1.1rem;
        font-weight: 400;
      }

      /* ═══════════════════════════════════════════
         FOOTER
         ═══════════════════════════════════════════ */
      footer {
        text-align: center;
        padding: 28px 24px;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 400;
        border-top: 1px solid var(--border-subtle);
        letter-spacing: 0.2px;
        position: relative;
        z-index: 1;
      }

      footer a {
        color: var(--accent-1);
        text-decoration: none;
        font-weight: 500;
        transition: color var(--transition-fast);
      }

      footer a:hover {
        color: var(--accent-3);
      }

      /* ═══════════════════════════════════════════
         RESPONSIVE
         ═══════════════════════════════════════════ */
      @media (max-width: 640px) {
        header { padding: 52px 20px 24px; }

        .controls {
          flex-direction: column;
          align-items: stretch;
        }

        .search-wrapper {
          max-width: 100%;
        }

        .results-count {
          margin-left: 0;
          text-align: right;
        }

        #Catalog,
        #loading {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 14px;
          padding: 0 16px 60px;
        }

        .card { padding: 18px 14px; }
        .card img { width: 90px; height: 58px; }
      }

      /* ═══════════════════════════════════════════
         SCROLLBAR
         ═══════════════════════════════════════════ */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-base);
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      /* ═══════════════════════════════════════════
         SELECTION
         ═══════════════════════════════════════════ */
      ::selection {
        background: rgba(124, 92, 252, 0.3);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <!-- Floating background orb -->
    <div class="bg-orb"></div>

    <div class="page-wrapper">
      <header>
        <div class="badge">🌍 Live Data</div>
        <h1>World Country Catalog</h1>
        <p class="subtitle">Explore countries, capitals, languages & more</p>
      </header>

      <div id="status"></div>

      <div class="controls">
        <div class="search-wrapper">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search" placeholder="Search countries..." autocomplete="off" />
        </div>

        <div class="select-wrapper">
          <select name="continent" id="sort">
            <option value="All">🌐 All Continents</option>
            <option value="Africa">🌍 Africa</option>
            <option value="Europe">🌍 Europe</option>
            <option value="Asia">🌏 Asia</option>
            <option value="North America">🌎 North America</option>
            <option value="South America">🌎 South America</option>
            <option value="Oceania">🌊 Oceania</option>
          </select>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <span class="results-count" id="resultsCount"></span>
      </div>

      <!-- Loading skeletons -->
      <div id="loading">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>

      <div id="Catalog"></div>

      <footer>
        Built with ❤️ using the <a href="https://countries-api-hsak.onrender.com/api/countries" target="_blank">Countries API</a>
      </footer>
    </div>

    <script src="catalogue.js"></script>
  </body>
</html>
